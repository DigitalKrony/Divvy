name: Build and Push to GHCR

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "PG_DB=${{ secrets.PG_DB }}" >> .env
          echo "PG_DB_USER=${{ secrets.PG_DB_USER }}" >> .env
          echo "PG_DB_PASS=${{ secrets.PG_DB_PASS }}" >> .env
          echo "PG_DB_HOST=${{ secrets.PG_DB_HOST }}" >> .env
          echo "PG_DB_PORT=${{ secrets.PG_DB_PORT }}" >> .env
          echo "ENVIRONMENT=${{ secrets.ENVIRONMENT }}" >> .env
          echo "WATCHTOWER_WEBHOOK=${{ secrets.WATCHTOWER_WEBHOOK }}" >> .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Spin up Docker Compose environment
        run: docker compose up -d

      - name: Wait for Database to initialize
        run: sleep 10

      - name: Run Database Migrations
        run: docker compose exec -T api alembic upgrade head

      - name: Run Unit Tests
        run: docker compose exec -T api python -m pytest

      - name: Shut down environment
        if: always()
        run: docker compose down -v

  check-version:
    name: Check Version Bump
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.version_check.outputs.bumped }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compare package.json versions
        id: version_check
        run: |
          _prev=$(git show HEAD~1:package.json | jq -r .version || echo "0.0.0")
          _cur=$(jq -r .version package.json)

          if [ "$_prev" === "$_cur" ]; then
            echo "Version ($_cur) hasn't changed. Skipping deployment."
            echo "bumped=false" >> $GITHUB_OUTPUT
          else
            echo "Version bumped to $_cur. Proceeding with deployment."
            echo "bumped=true" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    name: Build and Deploy
    needs: [test, check-version]
    if: needs.check-version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push the API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/middleware
          file: ./apps/middleware/Dockerfile
          push: true
          tags: ghcr.io/digitalkrony/divi-api:latest
