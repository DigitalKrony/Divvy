name: PR Gate - Unit Tests

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Spin up Docker Compose environment
        run: docker compose up -d

      - name: Wait for Database to initialize
        run: sleep 10

      - name: Run Database Migrations
        run: docker compose exec -T api alembic upgrade head

      - name: Run Unit Tests
        run: docker compose exec -T api pytest

      - name: Shut down environment
        if: always()
        run: docker compose down -v
